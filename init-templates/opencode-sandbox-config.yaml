# opencode-sandbox configuration
# Changes require a container rebuild: ocs-rebuild-container

# Unique name for this project (required).
# Set automatically by ocs-init to the project directory basename.
# At runtime, combined with a short hash of the project root path to form SANDBOX_ID,
# which is used for the container/image name and the state directory (~/.opencode-sandbox/<SANDBOX_ID>/).
# You may rename it, but a rebuild is required and the old state directory will be orphaned.
sandbox-name: my-project

# Outbound HTTP/HTTPS domains allowed via the proxy.
# A leading dot matches the domain and all its subdomains.
http-domain-whitelist:
  - .githubusercontent.com
  - .githubassets.com
  - .github.com
  - .githubcopilot.com
  - mise.run
  - .npmjs.org
  - .maven.org
  # - api.anthropic.com
  # - api.openai.com
  # - .openrouter.ai

# TCP ports on the host the container may reach directly,
# bypassing the proxy (e.g. databases).
host-ports:
  # - 5432
  # - 3306
  # - 6379
  # - 27017

# Host env vars forwarded into the container.
# Both key and value are required: CONTAINER_VAR: HOST_VAR
env-passthrough:
  # ANTHROPIC_API_KEY: ANTHROPIC_API_KEY
  # OPENAI_API_KEY: OPENAI_API_KEY
  # GH_TOKEN: MY_PROJECT_GH_TOKEN

# Static env vars set in the container. Safe to commit — no secrets here.
env:
  # GITHUB_REPOSITORY: my-org/my-repo
