http_port 3128

# Whitelist of allowed domains (one domain per line, populated from opencode-sandbox-firewall)
acl whitelist dstdomain "/etc/squid/sites.whitelist.txt"

# Standard port ACLs
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT method CONNECT

# Deny CONNECT to non-SSL ports
http_access deny CONNECT !SSL_ports

# Deny requests to non-safe ports
http_access deny !Safe_ports

# Allow whitelisted domains
http_access allow whitelist

# Deny everything else
http_access deny all

# Suppress access log noise to stdout
access_log none
cache_log /dev/null
cache_store_log none

